<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biologiya Test - Kalit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; }
        .answer-row { display: flex; align-items: center; justify-content: space-between; background: white; padding: 10px 15px; border-radius: 12px; margin-bottom: 8px; }
        .opt-btn { width: 40px; height: 40px; border: 2px solid #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; cursor: pointer; }
        .opt-btn.selected { background-color: #10b981; border-color: #10b981; color: white; }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="max-w-md mx-auto">
        <div class="mb-4">
            <h1 class="text-xl font-bold text-slate-800">BIOLOGIYA <span class="text-sm font-normal text-blue-500">35 TALIK TEST</span></h1>
        </div>

        <button onclick="getPDF()" class="w-full bg-red-500 text-white py-4 rounded-2xl font-bold mb-6 flex items-center justify-center gap-2 shadow-lg active:scale-95 transition">
            <i class="fas fa-file-pdf"></i> TEST PDF-NI YUKLASH
        </button>

        <div id="answer-sheet">
            </div>

        <div class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t flex gap-3 shadow-2xl">
            <button onclick="location.reload()" class="w-1/3 bg-slate-100 py-4 rounded-2xl font-bold">TOZALASH</button>
            <button onclick="sendResult()" class="w-2/3 bg-green-600 text-white py-4 rounded-2xl font-bold">YAKUNLASH</button>
        </div>
    </div>

    <script>
        // Telegramni ishga tushirish
        const tg = window.Telegram.WebApp;
        tg.expand();

        let results = {};
        const sheet = document.getElementById('answer-sheet');

        for (let i = 1; i <= 35; i++) {
            sheet.innerHTML += `
                <div class="answer-row shadow-sm">
                    <span class="font-bold text-slate-400 w-6">${i}.</span>
                    <div class="flex gap-2">
                        ${['A', 'B', 'C', 'D'].map(opt => `
                            <div onclick="pick(${i}, '${opt}')" id="btn-${i}-${opt}" class="opt-btn">${opt}</div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function pick(q, o) {
            ['A', 'B', 'C', 'D'].forEach(opt => document.getElementById(`btn-${q}-${opt}`).classList.remove('selected'));
            document.getElementById(`btn-${q}-${o}`).classList.add('selected');
            results[q] = o;
        }

        function getPDF() {
            tg.sendData("request_pdf_file");
            tg.close();
        }

        function sendResult() {
            if (Object.keys(results).length < 35) {
                if(!confirm("Hali hamma javob belgilanganicha yo'q. Baribir yuboramizmi?")) return;
            }
            tg.sendData(JSON.stringify(results));
            tg.close();
        }
    </script>
</body>
</html>
