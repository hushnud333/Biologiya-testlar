<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biologiya - Javoblar Varaqasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; }
        .answer-row { display: flex; align-items: center; justify-content: space-between; background: white; padding: 10px 15px; border-radius: 12px; margin-bottom: 8px; }
        .opt-btn { width: 40px; height: 40px; border: 2px solid #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; cursor: pointer; }
        .opt-btn.selected { background-color: #10b981; border-color: #10b981; color: white; }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="max-w-md mx-auto">
        <div class="mb-6 border-b pb-4 sticky top-0 bg-[#f8fafc] z-10 pt-2">
            <h1 class="text-2xl font-black text-slate-800" id="test-title">TEST JAVOBLARI</h1>
            <p class="text-sm text-slate-500">35 talik raqamli kalit</p>
        </div>

        <div id="answer-sheet">
            </div>

        <div class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t flex gap-3 shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
            <button onclick="location.reload()" class="w-1/3 bg-slate-100 py-4 rounded-2xl font-bold text-slate-600">TOZALASH</button>
            <button onclick="sendResult()" class="w-2/3 bg-green-600 text-white py-4 rounded-2xl font-bold">YAKUNLASH</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // URL dan test raqamini olish (Masalan: ?test=1)
        const urlParams = new URLSearchParams(window.location.search);
        const testId = urlParams.get('test') || "Noma'lum";
        
        // Sarlavhani o'zgartirish
        document.getElementById('test-title').innerText = `${testId}-TEST JAVOBLARI`;

        let results = {};
        const sheet = document.getElementById('answer-sheet');

        for (let i = 1; i <= 35; i++) {
            sheet.innerHTML += `
                <div class="answer-row shadow-sm">
                    <span class="font-bold text-slate-400 w-6">${i}.</span>
                    <div class="flex gap-2">
                        ${['A', 'B', 'C', 'D'].map(opt => `
                            <div onclick="pick(${i}, '${opt}')" id="btn-${i}-${opt}" class="opt-btn">${opt}</div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function pick(q, o) {
            ['A', 'B', 'C', 'D'].forEach(opt => document.getElementById(`btn-${q}-${opt}`).classList.remove('selected'));
            document.getElementById(`btn-${q}-${o}`).classList.add('selected');
            results[q] = o;
        }

        function sendResult() {
            if (Object.keys(results).length < 35) {
                if(!confirm("Hali hamma javob belgilanganicha yo'q. Baribir yuboramizmi?")) return;
            }
            
            // Botga test raqami va javoblarni birlashtirib yuboramiz
            const payload = {
                test_id: testId,
                answers: results
            };
            
            tg.sendData(JSON.stringify(payload));
            tg.close();
        }
    </script>
</body>
</html>
