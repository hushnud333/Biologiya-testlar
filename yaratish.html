<!DOCTYPE html>
<html>
<head>
    <title>Test Yaratish</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .savol-blok { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        input { width: 90%; padding: 8px; margin: 5px 0; }
    </style>
</head>
<body>
    <h2>40 ta test yarating</h2>
    <div id="testlar-konteyner"></div>
    <button onclick="testniSaqlash()" style="padding: 15px 30px; background: green; color: white; border: none; cursor: pointer;">Test Kodini Olish</button>

    <script>
        // 40 ta savol inputini avtomatik chiqarish
        const container = document.getElementById('testlar-konteyner');
        for (let i = 1; i <= 40; i++) {
            container.innerHTML += `
                <div class="savol-blok">
                    <p><b>${i}-savol:</b></p>
                    <input type="text" id="q${i}" placeholder="Savol matni">
                    <input type="text" id="a${i}" placeholder="A varianti">
                    <input type="text" id="b${i}" placeholder="B varianti (To'g'ri javob)">
                </div>
            `;
        }

        function testniSaqlash() {
            let barchaSavollar = [];
            for (let i = 1; i <= 40; i++) {
                barchaSavollar.push({
                    s: document.getElementById(`q${i}`).value,
                    a: document.getElementById(`a${i}`).value,
                    b: document.getElementById(`b${i}`).value
                });
            }
            // Ma'lumotni matnga aylantirish (Base64 kodlash - bu bizda ID o'rniga o'tadi)
            let kod = btoa(JSON.stringify(barchaSavollar));
            alert("Sizning test kodingiz (buni nusxalab oling):\n\n" + kod.substring(0, 10));
            console.log(kod); // To'liq kod konsolda chiqadi
        }
    </script>
</body>
</html>
