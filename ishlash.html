<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Ishlash</title>
    <style>
        :root { --primary: #3498db; --success: #27ae60; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .input-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input[type="text"] { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 10px; outline: none; }
        input[type="text"]:focus { border-color: var(--primary); }
        button { padding: 12px 20px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .savol-card { background: #fff; border: 1px solid #eee; padding: 20px; margin-bottom: 15px; border-radius: 12px; }
        .savol-matni { font-weight: bold; margin-bottom: 15px; color: var(--dark); display: block; }
        .variantlar label { 
            display: block; background: #f8f9fa; padding: 12px; margin: 8px 0; 
            border-radius: 10px; cursor: pointer; border: 1px solid #eee; transition: 0.2s;
        }
        .variantlar label:hover { background: #eef2f3; }
        .variantlar input { margin-right: 10px; }
        #check-btn { width: 100%; background: var(--success); margin-top: 20px; display: none; font-size: 1.1rem; }
        #result { margin-top: 20px; text-align: center; font-weight: bold; font-size: 1.2rem; display: none; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--dark);">📝 Testni Boshlash</h2>
    <div class="input-box">
        <input type="text" id="testKod" placeholder="Test kodini bu yerga qo'ying...">
        <button onclick="testniYuklash()">Yuklash</button>
    </div>

    <div id="testMaydoni"></div>
    <button id="check-btn" onclick="natijaniHisoblash()">Natijani Tekshirish</button>
    <div id="result"></div>
</div>

<script>
    let savollarBazasi = [];

    function testniYuklash() {
        const kod = document.getElementById('testKod').value;
        const maydon = document.getElementById('testMaydoni');
        
        try {
            // Kodni dekodlash (Base64 -> JSON)
            const decodedData = JSON.parse(decodeURIComponent(escape(atob(kod))));
            savollarBazasi = decodedData;
            maydon.innerHTML = "";

            savollarBazasi.forEach((s, index) => {
                maydon.innerHTML += `
                    <div class="savol-card">
                        <span class="savol-matni">${index + 1}. ${s.s}</span>
                        <div class="variantlar">
                            <label><input type="radio" name="q${index}" value="a"> A) ${s.a}</label>
                            <label><input type="radio" name="q${index}" value="b"> B) ${s.b}</label>
                            <label><input type="radio" name="q${index}" value="c"> C) ${s.c}</label>
                        </div>
                    </div>
                `;
            });

            document.getElementById('check-btn').style.display = "block";
            document.getElementById('result').style.display = "none";
        } catch (e) {
            alert("Xato! Kod noto'g'ri yoki buzilgan.");
        }
    }

    function natijaniHisoblash() {
        let togriCount = 0;
        savollarBazasi.forEach((s, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            if (selected && selected.value === s.r) {
                togriCount++;
            }
        });

        const rDiv = document.getElementById('result');
        rDiv.style.display = "block";
        rDiv.style.background = "#e8f5e9";
        rDiv.style.color = "#2e7d32";
        rDiv.innerHTML = `Natija: 40 tadan ${togriCount} ta to'g'ri! (${Math.round(togriCount/40*100)}%)`;
        
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>

</body>
</html>
